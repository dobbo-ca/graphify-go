# Regenerate the knowledge graph on every merge to main and commit it back, so
# graphify-out/graph.json always reflects the tip of main. This file doubles as
# the template to drop into your own repo: install the binary, build, commit.
name: graph

on:
  push:
    branches: [main]

# Serialize graph runs so back-to-back merges can't race. cancel-in-progress
# would be async best-effort, not mutual exclusion: two runs could push
# graphify-out/ concurrently and the loser's rebase would conflict on
# graph.json/GRAPH_REPORT.md (same tracked files, different tip) and be lost.
# Queue instead — each run starts after the previous finishes and checks out
# the latest tip, so the graph is fresh and pushes never collide.
concurrency:
  group: graph-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-graph:
    runs-on: ubuntu-latest
    # Skip the commit this job itself pushes, so it can't trigger itself.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      # In your own repo, replace this with:
      #   go install github.com/dobbo-ca/graphify-go/cmd/graphify@latest
      - name: Install graphify
        run: go build -o /usr/local/bin/graphify ./cmd/graphify

      - name: Build graph
        run: graphify build .

      - name: Commit graph if changed
        run: |
          if git diff --quiet -- graphify-out; then
            echo "graph unchanged"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          commit_graph() {
            git add graphify-out
            git commit -m "chore: regenerate knowledge graph [skip ci]"
          }
          commit_graph
          # A human commit can land on main between our build and push. On a
          # non-fast-forward rejection, resync to the latest tip and rebuild the
          # graph there, then retry. We rebuild rather than rebase: a rebase would
          # conflict on graphify-out/ if that commit also touched it, and the loop
          # would spin on a half-applied rebase. Rebuilding on top of the latest
          # tip is conflict-free and never stale (graphify build is deterministic).
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "push rejected (attempt $attempt) — resyncing to origin/$GITHUB_REF_NAME and rebuilding"
            git rebase --abort 2>/dev/null || true
            git fetch origin "$GITHUB_REF_NAME"
            git reset --hard FETCH_HEAD
            graphify build .
            if git diff --quiet -- graphify-out; then
              echo "graph already current on latest tip"
              exit 0
            fi
            commit_graph
          done
          echo "failed to push graph after 5 attempts" >&2
          exit 1
