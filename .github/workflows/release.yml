name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Bump the semver tag from conventional commits and refresh the changelog.
  semantic-release:
    runs-on: ubuntu-latest
    # Don't react to the changelog/graph commits the bots push.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    outputs:
      new_version: ${{ steps.uplift.outputs.new_version }}
      version_changed: ${{ steps.uplift.outputs.version_changed }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GH_PUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_PUB_APP_PEM }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Uplift
        uses: gembaadvantage/uplift-action@v2
        with:
          version: latest
          install-only: true

      - name: Run Uplift
        id: uplift
        run: |
          BEFORE_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          uplift release --fetch-all --skip-changelog
          AFTER_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$AFTER_TAG" ] && [ "$AFTER_TAG" != "$BEFORE_TAG" ]; then
            echo "new_version=$AFTER_TAG" >> $GITHUB_OUTPUT
            echo "version_changed=true" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Changelog
        if: steps.uplift.outputs.version_changed == 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: .cliff.toml
          args: --verbose --current
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Commit Changelog
        if: steps.uplift.outputs.version_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update changelog for ${{ steps.uplift.outputs.new_version }} [skip ci]" || echo "nothing to commit"
          git push origin main || echo "nothing to push"

  # graphify uses cgo (tree-sitter), so binaries are built on native OS runners
  # rather than cross-compiled from one host. Homebrew only needs darwin+linux.
  build-darwin:
    needs: semantic-release
    if: needs.semantic-release.outputs.version_changed == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - run: git fetch --tags --force
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build darwin archives
        env:
          VERSION: ${{ needs.semantic-release.outputs.new_version }}
        run: |
          for arch in arm64 amd64; do
            CC="clang"
            [ "$arch" = "amd64" ] && CC="clang -arch x86_64"
            LDFLAGS="-X main.version=${VERSION} -X main.commit=${GITHUB_SHA} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            CGO_ENABLED=1 GOOS=darwin GOARCH=$arch CC="$CC" \
              go build -ldflags "$LDFLAGS" -o graphify ./cmd/graphify
            tar czf "graphify-go-${VERSION}-darwin-${arch}.tar.gz" graphify
            shasum -a 256 "graphify-go-${VERSION}-darwin-${arch}.tar.gz" | awk '{print $1}' \
              > "graphify-go-${VERSION}-darwin-${arch}.tar.gz.sha256"
            rm graphify
          done
      - uses: actions/upload-artifact@v4
        with:
          name: darwin
          path: |
            graphify-go-*.tar.gz
            graphify-go-*.tar.gz.sha256

  build-linux:
    needs: semantic-release
    if: needs.semantic-release.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - run: git fetch --tags --force
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install aarch64 cross toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build linux archives
        env:
          VERSION: ${{ needs.semantic-release.outputs.new_version }}
        run: |
          for arch in amd64 arm64; do
            CC="gcc"
            [ "$arch" = "arm64" ] && CC="aarch64-linux-gnu-gcc"
            LDFLAGS="-X main.version=${VERSION} -X main.commit=${GITHUB_SHA} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            CGO_ENABLED=1 GOOS=linux GOARCH=$arch CC="$CC" \
              go build -ldflags "$LDFLAGS" -o graphify ./cmd/graphify
            tar czf "graphify-go-${VERSION}-linux-${arch}.tar.gz" graphify
            shasum -a 256 "graphify-go-${VERSION}-linux-${arch}.tar.gz" | awk '{print $1}' \
              > "graphify-go-${VERSION}-linux-${arch}.tar.gz.sha256"
            rm graphify
          done
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            graphify-go-*.tar.gz
            graphify-go-*.tar.gz.sha256

  release:
    needs: [semantic-release, build-darwin, build-linux]
    if: needs.semantic-release.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) -exec cp {} release-assets/ \;
          ls -lh release-assets/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.semantic-release.outputs.new_version }}
          name: ${{ needs.semantic-release.outputs.new_version }}
          body_path: CHANGELOG.md
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: [semantic-release, release]
    if: needs.semantic-release.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GH_PUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_PUB_APP_PEM }}
          owner: dobbo-ca
          repositories: homebrew-taps
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Extract SHA256 checksums
        id: checksums
        run: |
          find artifacts -name "*.sha256" -exec cp {} . \;
          echo "darwin_amd64=$(cat graphify-go-*-darwin-amd64.tar.gz.sha256)" >> $GITHUB_OUTPUT
          echo "darwin_arm64=$(cat graphify-go-*-darwin-arm64.tar.gz.sha256)" >> $GITHUB_OUTPUT
          echo "linux_amd64=$(cat graphify-go-*-linux-amd64.tar.gz.sha256)" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(cat graphify-go-*-linux-arm64.tar.gz.sha256)" >> $GITHUB_OUTPUT
      - name: Trigger Homebrew tap update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: dobbo-ca/homebrew-taps
          event-type: update-formula
          client-payload: |
            {
              "formula": "graphify-go",
              "version": "${{ needs.semantic-release.outputs.new_version }}",
              "darwin_amd64_sha": "${{ steps.checksums.outputs.darwin_amd64 }}",
              "darwin_arm64_sha": "${{ steps.checksums.outputs.darwin_arm64 }}",
              "linux_amd64_sha": "${{ steps.checksums.outputs.linux_amd64 }}",
              "linux_arm64_sha": "${{ steps.checksums.outputs.linux_arm64 }}"
            }
