name: Release

on:
  push:
    branches: [main]
    tags: ['[0-9]+.[0-9]+.[0-9]+', 'v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        options: [auto, beta, release]
        default: auto
      dry_run:
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # Resolve the next version from conventional commits via git-cliff.
  # push to main -> beta (X.Y.Z-beta.<run#>) ; push semver tag -> release.
  # Guard: skip beta tags the bot pushes (they match the tags glob but contain '-').
  version:
    if: ${{ !(github.ref_type == 'tag' && contains(github.ref_name, '-')) }}
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.version }}
      version_changed: ${{ steps.bump.outputs.changed }}
      is_beta: ${{ steps.bump.outputs.is_beta }}
      is_release: ${{ steps.bump.outputs.is_release }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GH_PUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_PUB_APP_PEM }}
          owner: dobbo-ca
          repositories: graphify-go

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Resolve version
        id: bump
        uses: dobbo-ca/.github/actions/semver-bump@v1
        with:
          mode: ${{ inputs.mode || 'auto' }}
          dry-run: ${{ inputs.dry_run || false }}

  # graphify uses cgo (tree-sitter), so binaries are built on native OS runners
  # rather than cross-compiled from one host. Homebrew only needs darwin+linux.
  build-darwin:
    needs: version
    if: needs.version.outputs.version_changed == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - run: git fetch --tags --force
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build darwin archives
        env:
          VERSION: ${{ needs.version.outputs.new_version }}
        run: |
          for arch in arm64 amd64; do
            CC="clang"
            [ "$arch" = "amd64" ] && CC="clang -arch x86_64"
            LDFLAGS="-X main.version=${VERSION} -X main.commit=${GITHUB_SHA} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            CGO_ENABLED=1 GOOS=darwin GOARCH=$arch CC="$CC" \
              go build -ldflags "$LDFLAGS" -o graphify ./cmd/graphify
            tar czf "graphify-go-${VERSION}-darwin-${arch}.tar.gz" graphify
            shasum -a 256 "graphify-go-${VERSION}-darwin-${arch}.tar.gz" | awk '{print $1}' \
              > "graphify-go-${VERSION}-darwin-${arch}.tar.gz.sha256"
            rm graphify
          done
      - uses: actions/upload-artifact@v4
        with:
          name: darwin
          path: |
            graphify-go-*.tar.gz
            graphify-go-*.tar.gz.sha256

  build-linux:
    needs: version
    if: needs.version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - run: git fetch --tags --force
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install aarch64 cross toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build linux archives
        env:
          VERSION: ${{ needs.version.outputs.new_version }}
        run: |
          for arch in amd64 arm64; do
            CC="gcc"
            [ "$arch" = "arm64" ] && CC="aarch64-linux-gnu-gcc"
            LDFLAGS="-X main.version=${VERSION} -X main.commit=${GITHUB_SHA} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            CGO_ENABLED=1 GOOS=linux GOARCH=$arch CC="$CC" \
              go build -ldflags "$LDFLAGS" -o graphify ./cmd/graphify
            tar czf "graphify-go-${VERSION}-linux-${arch}.tar.gz" graphify
            shasum -a 256 "graphify-go-${VERSION}-linux-${arch}.tar.gz" | awk '{print $1}' \
              > "graphify-go-${VERSION}-linux-${arch}.tar.gz.sha256"
            rm graphify
          done
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            graphify-go-*.tar.gz
            graphify-go-*.tar.gz.sha256

  release:
    needs: [version, build-darwin, build-linux]
    if: ${{ needs.version.outputs.version_changed == 'true' && inputs.dry_run != true && !(github.ref_type == 'tag' && contains(github.ref_name, '-')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - run: git fetch --tags --force
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2.13.1
      - name: Generate release notes
        run: git cliff --config .cliff.toml --latest --strip header -o CHANGELOG.md || echo "(no notes)" > CHANGELOG.md
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) -exec cp {} release-assets/ \;
          ls -lh release-assets/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_version }}
          name: ${{ needs.version.outputs.new_version }}
          body_path: CHANGELOG.md
          prerelease: ${{ needs.version.outputs.is_beta == 'true' }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: [version, release]
    if: ${{ needs.version.outputs.is_release == 'true' && inputs.dry_run != true }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GH_PUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_PUB_APP_PEM }}
          owner: dobbo-ca
          repositories: homebrew-taps
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Extract SHA256 checksums
        id: checksums
        run: |
          find artifacts -name "*.sha256" -exec cp {} . \;
          echo "darwin_amd64=$(cat graphify-go-*-darwin-amd64.tar.gz.sha256)" >> $GITHUB_OUTPUT
          echo "darwin_arm64=$(cat graphify-go-*-darwin-arm64.tar.gz.sha256)" >> $GITHUB_OUTPUT
          echo "linux_amd64=$(cat graphify-go-*-linux-amd64.tar.gz.sha256)" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(cat graphify-go-*-linux-arm64.tar.gz.sha256)" >> $GITHUB_OUTPUT
      - name: Trigger Homebrew tap update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: dobbo-ca/homebrew-taps
          event-type: update-formula
          client-payload: |
            {
              "formula": "graphify-go",
              "version": "${{ needs.version.outputs.new_version }}",
              "darwin_amd64_sha": "${{ steps.checksums.outputs.darwin_amd64 }}",
              "darwin_arm64_sha": "${{ steps.checksums.outputs.darwin_arm64 }}",
              "linux_amd64_sha": "${{ steps.checksums.outputs.linux_amd64 }}",
              "linux_arm64_sha": "${{ steps.checksums.outputs.linux_arm64 }}"
            }
